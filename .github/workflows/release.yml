name: Build Native Binaries

on:
  release:
    types: [created]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        include:
          - os: ubuntu-latest
            binary_name: tskr
            asset_name: tskr-linux
          - os: macos-latest
            binary_name: tskr
            asset_name: tskr-mac
          - os: windows-latest
            binary_name: tskr.exe
            asset_name: tskr.exe

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup GraalVM
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '21'
          distribution: 'graalvm'
          native-image-job-reports: 'true'

      - name: Build native binary
        run: |
          if [ "$RUNNER_OS" != "Windows" ]; then
            chmod +x gradlew
          fi
          ./gradlew nativeCompile
      

      - name: Upload binary to release
        uses: softprops/action-gh-release@v2
        with:
          files: build/native/nativeCompile/${{ matrix.binary_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}