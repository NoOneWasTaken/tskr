name: Build Native Binaries

on:
  release:
    types: [created]

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        include:
          - os: ubuntu-latest
            binary_name: tskr
            asset_name: tskr-linux
          - os: macos-latest
            binary_name: tskr
            asset_name: tskr-mac
          - os: windows-latest
            binary_name: tskr.exe
            asset_name: tskr.exe

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup GraalVM
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '25'
          distribution: 'graalvm'
          native-image-job-reports: 'true'

      - name: Build native binary (Unix)
        if: runner.os != 'Windows'
        timeout-minutes: 30
        run: |
          chmod +x gradlew
          ./gradlew nativeCompile

      - name: Build native binary (Windows)
        if: runner.os == 'Windows'
        timeout-minutes: 30
        run: ./gradlew nativeCompile

      - name: Rename binary
        if: runner.os != 'Windows'
        run: mv build/native/nativeCompile/${{ matrix.binary_name }} build/native/nativeCompile/${{ matrix.asset_name }}

      - name: Upload binary to release
        uses: softprops/action-gh-release@v2
        with:
          files: build/native/nativeCompile/${{ matrix.asset_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}